<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>拼图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #242424;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        .game-container {
            background: #0b0b0b;
            padding: 20px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;          /* 新增：让按钮相对于此容器居中 */
            max-width: 100vw;            /* 新增：限制容器不超过视口宽度 */
            max-height: 100vh;           /* 新增：限制容器不超过视口高度 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            max-width: 100%;
            max-height: calc(100vh - 40px); /* 新增：减去容器内边距，防止画布被裁剪 */
            border-radius: 20px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 0 0 1px #2f3542;
            cursor: grab;
            touch-action: none;
            object-fit: contain;         /* 新增：保证画布内容等比缩放（虽然canvas不一定支持，但无害） */
        }
        canvas:active {
            cursor: grabbing;
        }
        .toolbar {
            display: none;/*flex 或者 none*/
            justify-content: flex-end;
            margin-top: 16px;
            gap: 20px;
            align-items: center;
        }
        .fullscreen-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 16px 32px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 48px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 100;
            border: 2px solid #a29bfe;
            white-space: nowrap;         /* 防止文字换行 */
        }
        .fullscreen-btn.hidden {
            display: none;
        }
        .debug-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aab3cf;
            font-size: 16px;
        }
        .debug-label input {
            width: 20px;
            height: 20px;
            accent-color: #6c5ce7;
        }
        .note {
            color: #5f6a84;
            font-size: 14px;
        }
        /* 提示横屏的友好信息 */
        @media (orientation: portrait) {
            body::before {
                content: "请将设备旋转至横屏以获得最佳体验";
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: #000000cc;
                color: white;
                padding: 16px 32px;
                border-radius: 48px;
                font-size: 20px;
                z-index: 999;
            }
        }
    </style>
</head>

        // 判断点是否在多边形内 (射线法)
        function pointInPolygon(px, py, polygon) {
            if (!polygon || polygon.length < 3) return false;
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i].x, yi = polygon[i].y;
                const xj = polygon[j].x, yj = polygon[j].y;
                const intersect = ((yi > py) !== (yj > py)) &&
                    (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }
        
        // 判断多边形是否与矩形 (rx, ry, rw, rh) 相交
        function polygonIntersectsRect(polygon, rx, ry, rw, rh) {
            // 简单检查：多边形任一顶点在矩形内，或矩形的边与多边形相交 (粗略)
            for (let p of polygon) {
                if (p.x >= rx && p.x <= rx + rw && p.y >= ry && p.y <= ry + rh) {
                    return true;
                }
            }
            // 进一步检查矩形的四个角是否在多边形内
            const corners = [
                {x: rx, y: ry}, {x: rx+rw, y: ry}, 
                {x: rx+rw, y: ry+rh}, {x: rx, y: ry+rh}
            ];
            for (let c of corners) {
                if (pointInPolygon(c.x, c.y, polygon)) return true;
            }
            // 可加入边相交检测，但为简化，以上已覆盖绝大多数情况

        // ---------- 图片加载与初始化 ----------
        async function loadImages() {

        // ---------- 计算缩放与布局 ----------
        function computeScaleAndLayout() {
            // 防御：如果整体图未加载，使用默认尺寸（防止 NaN）
            const fw = fullImage ? fullImage.width : 1000;
            const fh = fullImage ? fullImage.height : 1000;
            
            globalScale = Math.min(CONFIG.HINT_MAX_W / fw, CONFIG.HINT_MAX_H / fh);
            console.log('🔧 globalScale 计算值:', globalScale);
            
            // 整体图绘制位置
            const hintW = fw * globalScale;
            const hintH = fh * globalScale;
            hintDrawPos.x = CONFIG.LEFT_AREA.x + (CONFIG.LEFT_AREA.w - hintW) / 2;
            hintDrawPos.y = CONFIG.LEFT_AREA.y + (CONFIG.LEFT_AREA.h - hintH) / 2;
            
            // 计算每块碎片的显示尺寸
            pieces.forEach((p, idx) => {
                // 若碎片图片未加载，使用默认宽高
                const origW = p.origW || 200;
                const origH = p.origH || 200;
                p.dispW = origW * globalScale;
                p.dispH = origH * globalScale;
                p.currentX = p.initX;
                p.currentY = p.initY;
                p.placed = false;
                p.isAnimating = false;
                // 初始化呼吸状态
                p.breath = {
                    intensity: 0,
                    direction: 1,
                    // 状态机：'idle', 'fadingIn', 'fadingOut'
                    state: 'idle',
                    // 动画起始值
                    startIntensity: 0,
                    targetIntensity: 0,
                    animStartTime: 0,
                    animDuration: CONFIG.FADE_DURATION,       // 淡入/淡出动画时长(ms)
                };
                console.log(`🔧 碎片 ${idx+1}: dispW=${p.dispW.toFixed(1)}, dispH=${p.dispH.toFixed(1)}, pos=(${p.currentX}, ${p.currentY})`);
            });
        }
        
        // ---------- 启动游戏循环 ----------
        function startGame() {
            computeScaleAndLayout();

            // 打印缩放与碎片尺寸，便于排查
            console.log('globalScale:', globalScale);
            pieces.forEach((p, idx) => {
                console.log(`碎片 ${idx+1}: origW=${p.origW}, origH=${p.origH}, dispW=${p.dispW}, dispH=${p.dispH}`);
            });
            
            // 初始整体图不透明度
            hintOpacity = 0.5;
            // 开始绘制
            if (animationFrame) cancelAnimationFrame(animationFrame);
            // 更新所有已归位碎片的呼吸光晕状态（每帧调用）
            function updateBreathEffects() {
                const now = performance.now();
                const BREATH_SPEED = 0.005;          // 呼吸循环速度
                const MIN_INTENSITY = 0.6;           // 呼吸下限
                const MAX_INTENSITY = 1.0;            // 呼吸上限

                pieces.forEach(p => {
                    if (!p.breath) return;
                    const breath = p.breath;

                    // ---------- 状态1：淡出（拖离或重置触发）----------
                    if (breath.state === 'fadingOut') {
                        const elapsed = now - breath.animStartTime;
                        if (elapsed < breath.animDuration) {
                            const t = elapsed / breath.animDuration;
                            // 线性插值从起始强度到0
                            breath.intensity = breath.startIntensity * (1 - t);
                        } else {
                            breath.intensity = 0;
                            breath.state = 'idle';
                            breath.direction = 1;      // 为下次归位做准备
                        }
                        return;
                    }

                    // ---------- 状态2：淡入（归位时触发）----------
                    if (breath.state === 'fadingIn') {
                        const elapsed = now - breath.animStartTime;
                        if (elapsed < breath.animDuration) {
                            const t = elapsed / breath.animDuration;
                            // 线性插值从0到目标强度
                            breath.intensity = breath.targetIntensity * t;
                        } else {
                            breath.intensity = breath.targetIntensity;
                            breath.state = 'idle';
                            breath.direction = 1;      // 进入正常呼吸循环
                        }
                        return;
                    }

                    // ---------- 状态3：空闲呼吸（仅当碎片已归位）----------
                    if (!p.placed) {
                        breath.intensity = 0;
                        breath.state = 'idle';
                        breath.direction = 1;
                        return;
                    }

                    // 正常呼吸循环
                    breath.intensity += breath.direction * BREATH_SPEED;

                    if (breath.intensity >= MAX_INTENSITY) {
                        breath.intensity = MAX_INTENSITY;
                        breath.direction = -1;
                    } else if (breath.intensity <= MIN_INTENSITY) {
                        breath.intensity = MIN_INTENSITY;
                        breath.direction = 1;
                    }
                });
            }

            function drawLoop() {
                updateCanvasRect();
                updateBreathEffects();  // 更新所有碎片的呼吸光晕状态
                drawScene();
                animationFrame = requestAnimationFrame(drawLoop);
            }
            animationFrame = requestAnimationFrame(drawLoop);
        }
        
        // ---------- 绘制场景 ----------

            // 3.1 绘制已归位碎片的光晕（基于 breath.intensity）
            pieces.forEach(piece => {
                // 满足任一条件即绘制光晕：1) 已归位  2) 正在淡出动画中
                const shouldDrawGlow = (piece.placed || piece.breath?.state === 'fadingOut') && piece.breath?.intensity > 0;
                if (shouldDrawGlow) {

            pieces.forEach(piece => {
                if (!piece.placed && !piece.isAnimating) {
                    // 如果正在拖拽且索引匹配，则跳过，稍后绘制
                    if (isDragging && pieces.indexOf(piece) === dragPieceIndex) return;
                    drawPiece(piece);
                }

            pieces.forEach(piece => {

            // 6. 绘制正在拖拽的碎片 (最上层)

                    ctx.fillText(`正确:(${Math.round(piece.correctX)},${Math.round(piece.correctY)})`, x, y - 15);
                    ctx.fillText(`当前:(${Math.round(piece.currentX)},${Math.round(piece.currentY)})`, x, y + 10);
                });
                ctx.restore();

            // 9. 调试模式：绘制每个碎片的多边形轮廓（增强可见性）
            if (debugMode) {
                ctx.save();
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 0; // 先关闭阴影避免干扰
                pieces.forEach(piece => {
                    if (!piece.polygon || piece.polygon.length === 0) {
                        console.warn(`⚠️ 碎片 ${piece.id} 无多边形数据`);
                        return;
                    }
                    
                    const centerX = piece.currentX;
                    const centerY = piece.currentY;
                    const scale = globalScale || 1;
                    const offsetX = -piece.origW / 2;
                    const offsetY = -piece.origH / 2;
                    
                    ctx.beginPath();
                    const first = piece.polygon[0];
                    let startX = centerX + (first.x + offsetX) * scale;
                    let startY = centerY + (first.y + offsetY) * scale;
                    ctx.moveTo(startX, startY);
                    
                    for (let i = 1; i < piece.polygon.length; i++) {
                        const pt = piece.polygon[i];
                        const x = centerX + (pt.x + offsetX) * scale;
                        const y = centerY + (pt.y + offsetY) * scale;
                        ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    
                    // 半透明红色填充，让多边形区域一目了然
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                    ctx.fill();
                    // 白色边界线

        // 绘制“一键重置”按钮（在左侧拼图区底部居中）
        function drawResetButton() {

        function drawPiece(piece) {

        // ========== 新方案（纯描边叠加，无滤镜） ==========
        function drawBreathGlow(piece) {
            const breath = piece.breath;
            if (!breath || breath.intensity <= 0) return;

            const intensity = breath.intensity;
            
            // ========== 可调参数 ==========
            const glowColor = { r: 255, g: 221, b: 85 }; // 暖黄色
            const maxLayers = 40;               // 最大描边层数（决定光晕厚度）
            const maxWidth = 200;                // 最外层描边宽度（逻辑像素）
            const minWidth = 20;                // 最内层描边宽度
            const baseAlpha = 0.9;             // 最内层透明度基数
            // =============================

            // 根据强度计算实际层数和宽度范围
            const layers = Math.floor(20 + intensity * maxLayers);  // 最少6层保证基础柔和度
            const widthStep = (maxWidth - minWidth) / layers;
            
            const centerX = piece.currentX;
            const centerY = piece.currentY;
            const scale = globalScale;
            const offsetX = -piece.origW / 2;
            const offsetY = -piece.origH / 2;
            
            // 计算多边形顶点（逻辑坐标）
            const points = piece.polygon.map(pt => ({
                x: centerX + (pt.x + offsetX) * scale,
                y: centerY + (pt.y + offsetY) * scale
            }));
            if (points.length < 3) return;
            
            // 获取 CSS 缩放，用于将逻辑线宽转换为实际绘制线宽
            const cssScale = canvasRect.width / CONFIG.CANVAS_WIDTH;
            
            ctx.save();
            // 将整体拼图轮廓从图片坐标系转换到画布坐标系，并设置为剪裁路径
            if (FULL_PUZZLE_POLYGON && FULL_PUZZLE_POLYGON.length >= 3) {
                ctx.beginPath();
                // 第一个顶点
                const first = FULL_PUZZLE_POLYGON[0];
                let startX = hintDrawPos.x + first.x * globalScale;
                let startY = hintDrawPos.y + first.y * globalScale;
                ctx.moveTo(startX, startY);
                
                // 依次连接后续顶点
                for (let i = 1; i < FULL_PUZZLE_POLYGON.length; i++) {
                    const pt = FULL_PUZZLE_POLYGON[i];
                    const x = hintDrawPos.x + pt.x * globalScale;
                    const y = hintDrawPos.y + pt.y * globalScale;
                    ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.clip();  // 设置剪裁，后续绘制只在该区域内可见
            }

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            // 使用 lighter 混合模式增强光感
            ctx.globalCompositeOperation = 'lighten';
            
            // 从内向外绘制多层描边
            for (let i = 0; i < layers; i++) {
                // 当前层线宽（逻辑值，需乘以 cssScale）
                const lineWidth = (minWidth + i * widthStep) * cssScale;
                // 透明度：内层亮、外层逐渐透明，并受强度影响
                const alpha = baseAlpha * intensity * Math.pow(0.9, i);
                
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let j = 1; j < points.length; j++) {
                    ctx.lineTo(points[j].x, points[j].y);
                }
                ctx.closePath();
                
                ctx.strokeStyle = `rgba(${glowColor.r}, ${glowColor.g}, ${glowColor.b}, ${alpha})`;
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            }
            
            // 额外绘制一层极淡的氛围层（更宽）
            /*ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let j = 1; j < points.length; j++) {
                ctx.lineTo(points[j].x, points[j].y);
            }
            ctx.closePath();
            ctx.strokeStyle = `rgba(${glowColor.r}, ${glowColor.g}, ${glowColor.b}, ${0.15 * intensity})`;
            ctx.lineWidth = maxWidth * 1.5 * cssScale;
            ctx.stroke();*/
            
            ctx.restore();
        }
        
        function drawPieceImage(piece) {
            const img = piece.img;
            
            // 诊断：图片未加载时显示粉色方块
            if (!img) {
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(piece.currentX - 25, piece.currentY - 25, 50, 50);
                return;
            }
            
            const w = piece.dispW;
            const h = piece.dispH;
            
            // 诊断：尺寸无效时显示红色叉叉
            if (!w || !h || w <= 0 || h <= 0) {
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(piece.currentX - 30, piece.currentY - 30);
                ctx.lineTo(piece.currentX + 30, piece.currentY + 30);
                ctx.moveTo(piece.currentX + 30, piece.currentY - 30);
                ctx.lineTo(piece.currentX - 30, piece.currentY + 30);
                ctx.stroke();
                return;
            }
            
            const x = piece.currentX - w / 2;
            const y = piece.currentY - h / 2;
            ctx.drawImage(img, x, y, w, h);
            
            // 可选：在碎片周围绘制半透明边框（调试时可取消注释）
            // ctx.strokeStyle = '#00ffff';
            // ctx.lineWidth = 2;
            // ctx.strokeRect(x, y, w, h);
        }
        
        // 添加 roundRect 方法
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
        
        // ---------- 事件处理 ----------
        // 检测点击是否在重置按钮区域内
        function isPointInResetButton(x, y) {
            const btn = CONFIG.RESET_BUTTON;
            const left = btn.x - btn.w / 2;
            const right = btn.x + btn.w / 2;
            const top = btn.y - btn.h / 2;
            const bottom = btn.y + btn.h / 2;
            return x >= left && x <= right && y >= top && y <= bottom;
        }

        function handleDragStart(clientX, clientY) {
            if (!pieces.length || isResetting) return;
            const pos = screenToCanvas(clientX, clientY);
            
            // 检测是否点击了重置按钮（且按钮应显示）
            const hasPlacedPiece = pieces.some(p => p.placed);
            if (hasPlacedPiece && !isResetting && isPointInResetButton(pos.x, pos.y)) {
                startResetAllPieces();
                return;  // 点击按钮不进行拖拽
            }
            
            // 从上到下遍历 (需模拟绘制顺序: 未归位 > 动画中)
            // 构建一个数组表示当前可拖拽碎片的顺序 (最后绘制的最上层)
            const draggableIndices = [];
            pieces.forEach((p, idx) => {
                if (p.isAnimating) {
                    p.isAnimating = false;
                    animatingPieces.delete(p.id);
                }
                draggableIndices.push(idx);  // 所有碎片均可拖拽（动画已被终止）
            });
            // 注意：动画中的碎片不可拖拽
            
            // 反向遍历，因为最后绘制的最上层
            for (let i = draggableIndices.length - 1; i >= 0; i--) {
                const idx = draggableIndices[i];
                const piece = pieces[idx];
                
                // 将鼠标坐标转换到碎片局部坐标系 (考虑缩放和位置)
                const localX = (pos.x - piece.currentX) / globalScale + piece.origW / 2;
                const localY = (pos.y - piece.currentY) / globalScale + piece.origH / 2;
                
                // 检查点是否在多边形内
                if (pointInPolygon(localX, localY, piece.polygon)) {
                    // 开始拖拽
                    isDragging = true;
                    dragPieceIndex = idx;
                    dragOffsetX = piece.currentX - pos.x;
                    dragOffsetY = piece.currentY - pos.y;
                    dragStartPlaced = piece.placed;
                    
                    if (piece.placed) {
                    piece.placed = false;
                    hintOpacity = 0.5;
                    const breath = piece.breath;
                    if (breath) {
                        // 如果当前正在淡入，立刻终止并转为淡出
                        breath.state = 'fadingOut';
                        breath.startIntensity = breath.intensity;
                        breath.animStartTime = performance.now();
                        breath.animDuration = CONFIG.FADE_DURATION;
                    }
                }
                    
                    // 提升该碎片绘制层级 (通过最后绘制实现，不需要额外操作)
                    break;
                }
            }
        }
        
        function handleDragMove(clientX, clientY) {
            if (!isDragging || dragPieceIndex === -1) return;
            const piece = pieces[dragPieceIndex];
            const pos = screenToCanvas(clientX, clientY);
            
            let newX = pos.x + dragOffsetX;
            let newY = pos.y + dragOffsetY;
            
            // 基于多边形顶点的画布投影进行边界约束，而非整张图片矩形
            // 计算多边形在当前临时位置下的画布坐标范围
            const scale = globalScale;
            const offsetX = -piece.origW / 2;
            const offsetY = -piece.origH / 2;
            
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            piece.polygon.forEach(pt => {
                const x = newX + (pt.x + offsetX) * scale;
                const y = newY + (pt.y + offsetY) * scale;
                minX = Math.min(minX, x);
                minY = Math.min(minY, y);
                maxX = Math.max(maxX, x);
                maxY = Math.max(maxY, y);
            });
            
            // 计算需要调整的偏移量，使多边形完全在画布内
            let adjustX = 0, adjustY = 0;
            if (minX < 0) adjustX = -minX;
            if (minY < 0) adjustY = -minY;
            if (maxX > CONFIG.CANVAS_WIDTH) adjustX = CONFIG.CANVAS_WIDTH - maxX;
            if (maxY > CONFIG.CANVAS_HEIGHT) adjustY = CONFIG.CANVAS_HEIGHT - maxY;
            
            newX += adjustX;
            newY += adjustY;
            
            piece.currentX = newX;
            piece.currentY = newY;
        }
        
        function handleDragEnd(clientX, clientY) {
            if (!isDragging || dragPieceIndex === -1) {
                isDragging = false;
                return;
            }
            
            const piece = pieces[dragPieceIndex];
            const pos = screenToCanvas(clientX, clientY);
            
            // 更新最终位置
            let finalX = pos.x + dragOffsetX;
            let finalY = pos.y + dragOffsetY;

            // 【修改】基于多边形顶点范围进行边界约束，确保不透明区域不超出画布
            const scale = globalScale;
            const offsetX = -piece.origW / 2;
            const offsetY = -piece.origH / 2;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            piece.polygon.forEach(pt => {
                const x = finalX + (pt.x + offsetX) * scale;
                const y = finalY + (pt.y + offsetY) * scale;
                minX = Math.min(minX, x);
                minY = Math.min(minY, y);
                maxX = Math.max(maxX, x);
                maxY = Math.max(maxY, y);
            });
            
            let adjustX = 0, adjustY = 0;
            if (minX < 0) adjustX = -minX;
            if (minY < 0) adjustY = -minY;
            if (maxX > CONFIG.CANVAS_WIDTH) adjustX = CONFIG.CANVAS_WIDTH - maxX;
            if (maxY > CONFIG.CANVAS_HEIGHT) adjustY = CONFIG.CANVAS_HEIGHT - maxY;
            
            finalX += adjustX;
            finalY += adjustY;
            piece.currentX = finalX;
            piece.currentY = finalY;
            
            // 根据模式处理
            if (debugMode) {
                // 调试模式：不做任何吸附/返回
            } else {
                // 正式模式
                const dx = Math.abs(piece.currentX - piece.correctX);
                const dy = Math.abs(piece.currentY - piece.correctY);
                
                if (dx < CONFIG.SNAP_THRESHOLD && dy < CONFIG.SNAP_THRESHOLD) {
                    // 吸附
                    piece.currentX = piece.correctX;
                    piece.currentY = piece.correctY;
                    piece.placed = true;
                    piece.isAnimating = false;
                    
                    const breath = piece.breath;
                    if (breath) {
                        // 启动淡入动画：从当前强度（通常为0）渐变至呼吸下限
                        breath.state = 'fadingIn';
                        breath.startIntensity = breath.intensity;  // 通常为0
                        breath.targetIntensity = 0.6;             // 呼吸下限，淡入到此值后开始呼吸
                        breath.animStartTime = performance.now();
                        breath.animDuration = CONFIG.FADE_DURATION;
                    }
                    
                    // 检查是否全部归位
                    const allPlaced = pieces.every(p => p.placed);
                    if (allPlaced) {
                        hintOpacity = 1.0;
                    }
                } else {
                    // 检查是否与左侧区域重叠 (使用多边形)
                    // 将多边形顶点转换到画布坐标系
                    const transformedPoly = piece.polygon.map(pt => ({
                        x: piece.currentX + (pt.x - piece.origW/2) * globalScale,
                        y: piece.currentY + (pt.y - piece.origH/2) * globalScale
                    }));
                    const overlaps = polygonIntersectsRect(transformedPoly, 
                        CONFIG.LEFT_AREA.x, CONFIG.LEFT_AREA.y, 
                        CONFIG.LEFT_AREA.w, CONFIG.LEFT_AREA.h);
                    
                    if (overlaps) {
                        // 启动返回动画
                        startReturnAnimation(piece);
                    }
                    // 否则停留在原地
                }
            }
            
            // 重置拖拽状态
            isDragging = false;
            dragPieceIndex = -1;
        }
        
        // 返回动画 (ease-out)
        function startReturnAnimation(piece) {
            if (piece.isAnimating) return;
            
            const startX = piece.currentX;
            const startY = piece.currentY;
            const targetX = piece.initX;
            const targetY = piece.initY;
            const startTime = performance.now();
            
            piece.isAnimating = true;
            animatingPieces.add(piece.id);
            
            function animateReturn(now) {
                if (!piece.isAnimating) return;

                const elapsed = now - startTime;
                let t = Math.min(elapsed / CONFIG.ANIMATION_DURATION, 1);
                // ease-out cubic
                t = 1 - Math.pow(1 - t, 3);
                
                piece.currentX = startX + (targetX - startX) * t;
                piece.currentY = startY + (targetY - startY) * t;
                
                if (t < 1) {
                    requestAnimationFrame(animateReturn);
                } else {
                    // 动画结束，确保多边形完全在画布内（尽管目标位置应已合法，但以防万一）
                    const scale = globalScale;
                    const offsetX = -piece.origW / 2;
                    const offsetY = -piece.origH / 2;
                    
                    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                    piece.polygon.forEach(pt => {
                        const x = targetX + (pt.x + offsetX) * scale;
                        const y = targetY + (pt.y + offsetY) * scale;
                        minX = Math.min(minX, x);
                        minY = Math.min(minY, y);
                        maxX = Math.max(maxX, x);
                        maxY = Math.max(maxY, y);
                    });
                    
                    let adjustX = 0, adjustY = 0;
                    if (minX < 0) adjustX = -minX;
                    if (minY < 0) adjustY = -minY;
                    if (maxX > CONFIG.CANVAS_WIDTH) adjustX = CONFIG.CANVAS_WIDTH - maxX;
                    if (maxY > CONFIG.CANVAS_HEIGHT) adjustY = CONFIG.CANVAS_HEIGHT - maxY;
                    
                    piece.currentX = targetX + adjustX;
                    piece.currentY = targetY + adjustY;
                    piece.isAnimating = false;
                    animatingPieces.delete(piece.id);
                }
            }
            
            requestAnimationFrame(animateReturn);
        }

        // 一键重置：所有碎片以缓动动画飞回初始位置
        function startResetAllPieces() {
            if (isResetting) return;
            
            // 停止所有正在进行的单个碎片动画
            pieces.forEach(p => {
                p.isAnimating = false;
            });
            animatingPieces.clear();
            isDragging = false;
            dragPieceIndex = -1;
            
            // 记录每个碎片的起始和目标位置
            resetStartPositions = pieces.map(p => ({
                piece: p,
                startX: p.currentX,
                startY: p.currentY,
                targetX: p.initX,
                targetY: p.initY,
            }));
            
            // 将所有碎片设为未归位，恢复整体图不透明度
            const now = performance.now();
            pieces.forEach(p => {
                if (p.placed) {
                    p.placed = false;
                    const breath = p.breath;
                    if (breath) {
                        breath.state = 'fadingOut';
                        breath.startIntensity = breath.intensity;
                        breath.animStartTime = now;
                        breath.animDuration = CONFIG.FADE_DURATION;
                    }
                }
            });
            hintOpacity = 0.5;
            
            isResetting = true;
            resetStartTime = performance.now();
            
            function animateReset(now) {
                const elapsed = now - resetStartTime;
                let t = Math.min(elapsed / CONFIG.RESET_ANIMATION_DURATION, 1);
                // ease-out cubic
                t = 1 - Math.pow(1 - t, 3);
                
                // 更新每个碎片的位置
                resetStartPositions.forEach(item => {
                    const p = item.piece;
                    p.currentX = item.startX + (item.targetX - item.startX) * t;
                    p.currentY = item.startY + (item.targetY - item.startY) * t;
                });
                
                if (t < 1) {
                    requestAnimationFrame(animateReset);
                } else {
                    // 动画结束，确保所有碎片精确落在初始位置
                    pieces.forEach(p => {
                        p.currentX = p.initX;
                        p.currentY = p.initY;
                    });
                    isResetting = false;
                    resetStartPositions = [];
                }
            }
            
            requestAnimationFrame(animateReset);
        }

        // ---------- 全屏按钮与旋转提示 ----------
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // 根据横竖屏状态更新按钮文字
        function updateFullscreenBtnText() {
            if (!fullscreenBtn) return;
            const isPortrait = window.innerHeight > window.innerWidth;
            // 竖屏时提示旋转，横屏时提示全屏
            fullscreenBtn.textContent = isPortrait ? '↻ 请旋转屏幕' : '⛶ 全屏体验';
        }

        // 进入全屏（兼容各浏览器）
        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        // 按钮点击处理：竖屏时弹窗提示旋转，横屏时进入全屏，点击后隐藏按钮
        function onFullscreenBtnClick() {
            const isPortrait = window.innerHeight > window.innerWidth;
            if (isPortrait) {
                alert('请将设备旋转至横屏以获得最佳体验');
            } else {
                enterFullscreen();
            }
            fullscreenBtn.classList.add('hidden');
        }
        
        // ---------- 事件绑定 ----------
        function bindEvents() {
            // 用于记录最后一次触摸位置（供 touchend 使用）
            let lastTouchClientX = 0, lastTouchClientY = 0;

            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                handleDragStart(e.clientX, e.clientY);
            });
            
            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    e.preventDefault();
                    handleDragMove(e.clientX, e.clientY);
                }
            });
            
            window.addEventListener('mouseup', (e) => {
                if (isDragging) {
                    e.preventDefault();
                    handleDragEnd(e.clientX, e.clientY);
                }
            });
            
            // 触摸事件
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                // 记录初始触摸位置
                lastTouchClientX = touch.clientX;
                lastTouchClientY = touch.clientY;
                handleDragStart(touch.clientX, touch.clientY);
            }, {passive: false});
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (isDragging) {
                    const touch = e.touches[0];
                    // 更新最后一次触摸位置
                    lastTouchClientX = touch.clientX;
                    lastTouchClientY = touch.clientY;
                    handleDragMove(touch.clientX, touch.clientY);
                }
            }, {passive: false});
            
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (isDragging) {
                    // 使用最后一次记录的触摸位置，避免因传入 (0,0) 导致坐标跳变
                    handleDragEnd(lastTouchClientX, lastTouchClientY);
                }
            });
            
            // 窗口大小变化时更新
            window.addEventListener('resize', () => {
                updateCanvasRect();
                updateFullscreenBtnText();
            });
            
            // 调试模式切换
            debugCheckbox.addEventListener('change', (e) => {
                debugMode = e.target.checked;
            });

            // 全屏按钮事件绑定
            if (fullscreenBtn) {
                fullscreenBtn.addEventListener('click', onFullscreenBtnClick);
                updateFullscreenBtnText();
            }
        }
        
        // ---------- 启动一切 ----------
        function init() {
            updateCanvasRect();
            bindEvents();
            loadImages();
            updateFullscreenBtnText();
        }
        
        init();
    })();
</script>
